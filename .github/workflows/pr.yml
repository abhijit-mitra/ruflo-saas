name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-tests-and-comment:
    name: Run Tests & Post PR Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: src/backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('src/backend/package-lock.json') }}
          restore-keys: |
            backend-deps-${{ runner.os }}-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: src/frontend/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            frontend-deps-${{ runner.os }}-

      - name: Run backend tests
        id: backend-tests
        continue-on-error: true
        working-directory: src/backend
        run: |
          npm ci
          npx prisma generate
          npx vitest run --reporter=verbose 2>&1 | tee /tmp/backend-test-output.txt
          echo "exit-code=$?" >> "$GITHUB_OUTPUT"

      - name: Run frontend tests
        id: frontend-tests
        continue-on-error: true
        working-directory: src/frontend
        run: |
          npm ci
          npx vitest run --reporter=verbose 2>&1 | tee /tmp/frontend-test-output.txt
          echo "exit-code=$?" >> "$GITHUB_OUTPUT"

      - name: Check for infra changes
        id: infra-changes
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^infra/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.infra-changes.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform plan
        id: terraform-plan
        if: steps.infra-changes.outputs.changed == 'true'
        continue-on-error: true
        working-directory: infra
        run: |
          terraform init -backend=false
          terraform validate 2>&1 | tee /tmp/terraform-output.txt
          echo "exit-code=$?" >> "$GITHUB_OUTPUT"

      - name: Post PR comment with results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const backendResult = '${{ steps.backend-tests.outcome }}' === 'success' ? 'Passed' : 'Failed';
            const frontendResult = '${{ steps.frontend-tests.outcome }}' === 'success' ? 'Passed' : 'Failed';
            const backendIcon = backendResult === 'Passed' ? ':white_check_mark:' : ':x:';
            const frontendIcon = frontendResult === 'Passed' ? ':white_check_mark:' : ':x:';

            let body = `## PR Test Results\n\n`;
            body += `| Suite | Status |\n`;
            body += `|-------|--------|\n`;
            body += `| Backend Tests | ${backendIcon} ${backendResult} |\n`;
            body += `| Frontend Tests | ${frontendIcon} ${frontendResult} |\n`;

            const infraChanged = '${{ steps.infra-changes.outputs.changed }}' === 'true';
            if (infraChanged) {
              const terraformResult = '${{ steps.terraform-plan.outcome }}' === 'success' ? 'Valid' : 'Invalid';
              const terraformIcon = terraformResult === 'Valid' ? ':white_check_mark:' : ':x:';
              body += `| Terraform Validate | ${terraformIcon} ${terraformResult} |\n`;
            } else {
              body += `| Terraform | :heavy_minus_sign: No infra changes |\n`;
            }

            body += `\n---\n*Generated by CI on commit ${context.sha.substring(0, 7)}*`;

            // Find and update existing bot comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## PR Test Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
