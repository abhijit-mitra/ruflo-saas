name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend — Lint, Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        uses: actions/cache@v5
        with:
          path: src/backend/node_modules
          key: backend-deps-${{ runner.os }}-${{ hashFiles('src/backend/package-lock.json') }}
          restore-keys: |
            backend-deps-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --reporter=verbose

  frontend-test:
    name: Frontend — Lint, Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache frontend node_modules
        uses: actions/cache@v5
        with:
          path: src/frontend/node_modules
          key: frontend-deps-${{ runner.os }}-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            frontend-deps-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run --reporter=verbose

  terraform-validate:
    name: Terraform — Validate & Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform (no backend)
        run: terraform init -backend=false

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive
